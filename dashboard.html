<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Proyectos Eleva</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }
    /* HEADER */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: white;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .header-left h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    .header-left p { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
    .header-right { text-align: right; font-size: 0.82rem; color: #94a3b8; }
    .header-right span { display: block; color: #e2e8f0; font-weight: 600; font-size: 0.9rem; }

    /* KPI CARDS */
    .kpi-bar {
      display: flex; gap: 16px; padding: 24px 40px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }
    .kpi-card {
      flex: 1; min-width: 130px;
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px 20px;
      border-left: 4px solid #ccc;
      display: flex; flex-direction: column; gap: 4px;
    }
    .kpi-card.en-curso { border-left-color: #3b82f6; }
    .kpi-card.por-hacer { border-left-color: #f59e0b; }
    .kpi-card.backlog { border-left-color: #8b5cf6; }
    .kpi-card.finalizado { border-left-color: #10b981; }
    .kpi-card.deprecado { border-left-color: #6b7280; }
    .kpi-num { font-size: 2rem; font-weight: 800; line-height: 1; }
    .kpi-card.en-curso .kpi-num { color: #3b82f6; }
    .kpi-card.por-hacer .kpi-num { color: #f59e0b; }
    .kpi-card.backlog .kpi-num { color: #8b5cf6; }
    .kpi-card.finalizado .kpi-num { color: #10b981; }
    .kpi-card.deprecado .kpi-num { color: #6b7280; }
    .kpi-label { font-size: 0.75rem; color: #64748b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

    /* FILTERS */
    .filters {
      padding: 16px 40px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .filter-label { font-size: 0.8rem; color: #64748b; font-weight: 600; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; cursor: pointer; font-size: 0.78rem; font-weight: 600;
      color: #475569; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      padding: 10px 40px 40px;
    }

    /* PROJECT CARD */
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .card-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f1f5f9;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    }
    .card-key { font-size: 0.72rem; color: #94a3b8; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
    .card-title { font-size: 0.95rem; font-weight: 700; color: #1e293b; line-height: 1.35; flex: 1; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; white-space: nowrap;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .status-badge::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
    .badge-en-curso { background: #dbeafe; color: #1d4ed8; }
    .badge-en-curso::before { background: #3b82f6; }
    .badge-por-hacer { background: #fef3c7; color: #92400e; }
    .badge-por-hacer::before { background: #f59e0b; }
    .badge-backlog { background: #ede9fe; color: #5b21b6; }
    .badge-backlog::before { background: #8b5cf6; }
    .badge-finalizado { background: #d1fae5; color: #065f46; }
    .badge-finalizado::before { background: #10b981; }
    .badge-deprecado { background: #f1f5f9; color: #64748b; }
    .badge-deprecado::before { background: #94a3b8; }

    .card-body { padding: 14px 20px; flex: 1; }
    .card-desc {
      font-size: 0.82rem; color: #475569; line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer {
      padding: 12px 20px;
      background: #f8fafc;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #f1f5f9;
      flex-wrap: wrap; gap: 8px;
    }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: #64748b; }
    .meta-icon { font-size: 0.9rem; }
    .meta-item strong { color: #334155; font-weight: 600; }

    .due-overdue { color: #dc2626 !important; }
    .due-overdue strong { color: #dc2626 !important; }
    .due-soon { color: #d97706 !important; }
    .due-soon strong { color: #d97706 !important; }
    .due-ok { color: #059669 !important; }
    .due-ok strong { color: #059669 !important; }

    /* Section title */
    .section-title {
      padding: 20px 40px 0;
      font-size: 0.8rem; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 1px;
    }

    .no-results { padding: 40px; text-align: center; color: #94a3b8; font-size: 0.9rem; }

    /* Legend */
    .legend { padding: 0 40px 10px; display: flex; gap: 16px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: #64748b; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

    @media (max-width: 600px) {
      .header, .kpi-bar, .grid, .filters, .section-title, .legend { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

function statusBadgeClass(status) {
  const map = {
    "En curso": "badge-en-curso",
    "Tareas por hacer": "badge-por-hacer",
    "Backlog": "badge-backlog",
    "Finalizada": "badge-finalizado",
    "Deprecado": "badge-deprecado"
  };
  return map[status] || "badge-backlog";
}

function formatDate(d) {
  if (!d) return null;
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('es-CL', {day:'2-digit', month:'short', year:'numeric'});
}

function dueDateClass(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  const diff = (dt - today) / (1000 * 60 * 60 * 24);
  if (diff < 0) return 'due-overdue';
  if (diff <= 30) return 'due-soon';
  return 'due-ok';
}

function renderKPIs(data) {
  const counts = {};
  data.forEach(p => { counts[p.status] = (counts[p.status] || 0) + 1; });
  const kpiDefs = [
    {key:"En curso", label:"En curso", cls:"en-curso"},
    {key:"Tareas por hacer", label:"Por hacer", cls:"por-hacer"},
    {key:"Backlog", label:"Backlog", cls:"backlog"},
    {key:"Finalizada", label:"Finalizados", cls:"finalizado"},
    {key:"Deprecado", label:"Deprecados", cls:"deprecado"},
  ];
  document.getElementById('kpi-bar').innerHTML = kpiDefs.map(k => `
    <div class="kpi-card ${k.cls}">
      <span class="kpi-num">${counts[k.key] || 0}</span>
      <span class="kpi-label">${k.label}</span>
    </div>
  `).join('') + `
    <div class="kpi-card" style="border-left-color:#0f3460">
      <span class="kpi-num" style="color:#0f3460">${data.length}</span>
      <span class="kpi-label">Total épicas</span>
    </div>
  `;
}

function renderCards(data) {
  const grid = document.getElementById('grid');
  if (!data.length) {
    grid.innerHTML = '<div class="no-results">No hay proyectos que coincidan con el filtro seleccionado.</div>';
    return;
  }
  grid.innerHTML = data.map(p => {
    const dueStr = formatDate(p.due);
    const dueClass = p.due ? dueDateClass(p.due) : '';
    const dueSuffix = p.due && dueDateClass(p.due) === 'due-overdue' ? ' ⚠️' : '';
    return `
    <div class="card" data-status="${p.status}">
      <div class="card-header">
        <div>
          <div class="card-key">${p.key}</div>
          <div class="card-title">${p.name}</div>
        </div>
        <span class="status-badge ${statusBadgeClass(p.status)}">${p.status}</span>
      </div>
      <div class="card-body">
        <p class="card-desc">${p.desc}</p>
      </div>
      <div class="card-footer">
        <div class="meta-item ${dueClass}">
          <span class="meta-icon">📅</span>
          <span>${dueStr ? '<strong>' + dueStr + '</strong>' + dueSuffix : '<span style="color:#cbd5e1">Sin fecha definida</span>'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">👤</span>
          <strong>${p.assignee}</strong>
        </div>
      </div>
    </div>`;
  }).join('');
}

let currentFilter = 'all';

function filterStatus(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? projects : projects.filter(p => p.status === status);
  document.getElementById('section-label').textContent =
    status === 'all' ? `Todos los proyectos (${projects.length})` : `${status} (${filtered.length})`;
  renderCards(filtered);
}
