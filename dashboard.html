<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Postventa — Eleva</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1e293b;
    }

    /* ─── HEADER ─── */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #1d4ed8 100%);
      color: white;
      padding: 28px 48px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; }
    .header p  { color: #93c5fd; font-size: 0.85rem; margin-top: 4px; }
    .header-meta { text-align: right; font-size: 0.8rem; color: #93c5fd; }
    .header-meta strong { display: block; color: #fff; font-size: 1rem; }
    .header-nav a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.82rem;
      margin-left: 16px;
      padding: 6px 14px;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .header-nav a:hover { background: #1d4ed8; color: white; }

    /* ─── KPI ROW ─── */
    .kpi-row {
      display: flex;
      background: white;
      border-bottom: 2px solid #e2e8f0;
    }
    .kpi {
      flex: 1; padding: 16px 20px;
      border-right: 1px solid #f1f5f9;
      display: flex; align-items: center; gap: 12px;
    }
    .kpi:last-child { border-right: none; }
    .kpi-icon { font-size: 1.5rem; }
    .kpi-val { font-size: 1.6rem; font-weight: 800; line-height: 1; }
    .kpi-lbl { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-top: 2px; }
    .c-blue   { color: #2563eb; }
    .c-amber  { color: #d97706; }
    .c-red    { color: #dc2626; }
    .c-violet { color: #7c3aed; }
    .c-green  { color: #059669; }
    .c-slate  { color: #94a3b8; }

    /* ─── FILTERS ─── */
    .filters {
      background: white;
      padding: 16px 48px;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filters-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1.5px solid #e2e8f0;
      background: white;
      font-size: 0.78rem;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #2563eb; color: #2563eb; }
    .filter-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    .search-input {
      margin-left: auto;
      padding: 7px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.82rem;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #2563eb; }

    /* ─── CARDS GRID ─── */
    .grid-wrap { padding: 28px 48px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ─── CARD ─── */
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px #f1f5f9;
      transition: box-shadow 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 14px 14px 0 0;
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; margin-top: 6px; }
    .card-key {
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      font-family: monospace;
      letter-spacing: 0.3px;
    }
    .card-badge {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      color: white;
      white-space: nowrap;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      line-height: 1.35;
    }
    .card-desc {
      font-size: 0.78rem;
      color: #64748b;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
      flex: 1;
    }
    .card-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem;
      color: #94a3b8;
      border-top: 1px solid #f1f5f9;
      padding-top: 10px;
    }
    .card-meta .due { font-weight: 700; color: #475569; }
    .card-meta .due.overdue { color: #dc2626; }
    .card-meta .due.soon { color: #d97706; }

    /* STATUS COLORS */
    .bg-en-curso     { background: #2563eb; }
    .bg-tareas       { background: #d97706; }
    .bg-backlog      { background: #7c3aed; }
    .bg-validacion   { background: #059669; }
    .bg-bloqueado    { background: #dc2626; }
    .bg-refinamiento { background: #0891b2; }
    .bg-default      { background: #64748b; }

    .accent-en-curso     { background: #2563eb; }
    .accent-tareas       { background: #d97706; }
    .accent-backlog      { background: #7c3aed; }
    .accent-validacion   { background: #059669; }
    .accent-bloqueado    { background: #dc2626; }
    .accent-refinamiento { background: #0891b2; }
    .accent-default      { background: #64748b; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
      font-size: 0.9rem;
      grid-column: 1 / -1;
    }
    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 Dashboard Postventa — Eleva</h1>
    <p>Épicas del proyecto ELV con label Postventa · Fuente: Jira</p>
  </div>
  <div style="display:flex;align-items:center;gap:24px;">
    <nav class="header-nav">
      <a href="index.html">🏠 Inicio</a>
      <a href="roadmap.html">📅 Roadmap</a>
    </nav>
    <div class="header-meta">
      <strong id="today-label"></strong>
      Actualizado automáticamente
    </div>
  </div>
</div>

<div class="kpi-row" id="kpi-row"></div>

<div class="filters">
  <span class="filters-label">Estado</span>
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="En curso">En curso</button>
  <button class="filter-btn" data-filter="Tareas por hacer">Por hacer</button>
  <button class="filter-btn" data-filter="Backlog">Backlog</button>
  <button class="filter-btn" data-filter="Validacion">Validación</button>
  <button class="filter-btn" data-filter="Bloqueado">Bloqueado</button>
  <button class="filter-btn" data-filter="Listo para refinamiento">Refinamiento</button>
  <input class="search-input" type="text" placeholder="🔍  Buscar épica..." id="search-input"/>
</div>

<div class="grid-wrap">
  <div class="cards-grid" id="cards-grid"></div>
</div>

<div class="footer">Eleva Postventa · Grupo Kaufmann · Datos extraídos de Jira en tiempo real</div>

<script>
const ALL_EPICS = [
  { key:"ELV-3033", summary:"Perfil de cliente", status:"Validacion", duedate:"2026-03-20", assignee:"Fernando Chazarreta", description:"Centralizar información del cliente en Eleva con ficha 360°: vehículos, historial OT, contactabilidad y recomendaciones de IA para la fuerza de ventas." },
  { key:"ELV-3456", summary:"Métricas de usabilidad Eleva", status:"Backlog", duedate:"2026-03-21", assignee:"Andrea", description:"Métricas de uso de Eleva para Gerencia de Servicios: frecuencia de ingreso por asesor, uso por sección y dimensiones como sucursal y país." },
  { key:"ELV-3454", summary:"Información de Garantía General y Extendida", status:"Tareas por hacer", duedate:"2026-03-28", assignee:"Andrea", description:"Semáforo visual en Venta Digital para mostrar el estado de garantías del cliente y detectar oportunidades de venta de garantías extendidas." },
  { key:"ELV-2965", summary:"Pautas de Mantenimiento en Eleva Perú", status:"Bloqueado 🚨", duedate:"2026-03-29", assignee:"Andrea", description:"Visualización de pautas de mantenimiento de vehículos dentro de Eleva para informar al cliente sobre los servicios recomendados según fabricante." },
  { key:"ELV-2913", summary:"Refactor: Mis Ventas Eleva", status:"Backlog", duedate:"2026-04-06", assignee:"Mauricio Etchevest", description:"Rediseño de Mis Ventas con solapas digitales/manuales, filtros por campo, exportación a Excel, campo Categoría y KPIs resumen." },
  { key:"ELV-3122", summary:"Home Eleva", status:"Tareas por hacer", duedate:"2026-04-15", assignee:"Victor Asencio", description:"Nuevo Home para Eleva con dashboards personalizados por perfil de asesor, información clave para la gestión diaria y acciones prioritarias." },
  { key:"ELV-3491", summary:"Filtros Ofertas Originales vs Alternativos", status:"Backlog", duedate:"2026-04-18", assignee:"Andrea", description:"Filtros en el módulo de ofertas de servicio para distinguir entre repuestos originales y alternativas equivalentes en la propuesta comercial." },
  { key:"ELV-2759", summary:"Selling Speech 2.0", status:"Tareas por hacer", duedate:"2026-04-30", assignee:"Andrea", description:"Acceso a datos de OT históricas y abiertas de un vehículo para mejorar la información disponible al momento de cotizar en Eleva." },
  { key:"ELV-3124", summary:"Portal Smart — Indicadores por Sucursal", status:"Backlog", duedate:"2026-05-31", assignee:"Andrea", description:"Dashboard con indicadores de NPS, metas y permanencia por sucursal, con drill-down a nivel asesor/orden de trabajo y control de acceso por rol." },
  { key:"ELV-3321", summary:"KPI Paso Vehicular", status:"Backlog", duedate:"2026-05-31", assignee:"Andrea", description:"Porcentaje de cotizaciones realizadas vs. clientes que visitan la sucursal para mejorar la proactividad comercial." },
  { key:"ELV-3319", summary:"Semáforo de Productos", status:"Listo para refinamiento", duedate:"2026-06-14", assignee:"Andrea", description:"Indicador de productos y servicios no contratados por vehículo en la cartera de clientes para anticipar cotizaciones efectivas." },
  { key:"ELV-3156", summary:"Incrementales Agenda", status:"Backlog", duedate:"2026-06-14", assignee:"Andrea", description:"Mejoras incrementales en la agenda: anulación de reservas, gestión para terceros y perfil call center para agendamiento multi-asesor." },
  { key:"ELV-2912", summary:"Refactor: Mis Cotizaciones", status:"Backlog", duedate:"2026-06-25", assignee:"Mauricio Etchevest", description:"Rediseño de Mis Cotizaciones con todos los productos, filtros reenviar/re-cotizar, reenvío por WhatsApp y campos enriquecidos." },
  { key:"ELV-3521", summary:"Whatsapp Eleva incluye asesor", status:"Backlog", duedate:null, assignee:"Andrea", description:"Integración de WhatsApp en Eleva incluyendo al asesor como parte del flujo de comunicación con el cliente." },
  { key:"ELV-3072", summary:"Incrementales Asistencia en Ruta", status:"Tareas por hacer", duedate:null, assignee:"Andrea", description:"Exclusión de marca Smart de las cards de asistencia en ruta e incorporación al flujo de pago de Myservice para MB y Maxus." },
];

const STATUS_MAP = {
  "en curso":               { cls:"en-curso",     label:"En curso" },
  "tareas por hacer":       { cls:"tareas",        label:"Por hacer" },
  "backlog":                { cls:"backlog",       label:"Backlog" },
  "validacion":             { cls:"validacion",    label:"Validación" },
  "validación":             { cls:"validacion",    label:"Validación" },
  "bloqueado 🚨":           { cls:"bloqueado",     label:"Bloqueado 🚨" },
  "bloqueado":              { cls:"bloqueado",     label:"Bloqueado" },
  "listo para refinamiento":{ cls:"refinamiento",  label:"Refinamiento" },
  "refinamiento":           { cls:"refinamiento",  label:"Refinamiento" },
};
function getStatusInfo(s){ return STATUS_MAP[s.toLowerCase()] || { cls:"default", label: s }; }

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const today30 = new Date(TODAY); today30.setDate(today30.getDate()+30);

function fmtDate(d){ return new Date(d).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}); }
function dueClass(d){
  if(!d) return '';
  const dt = new Date(d);
  if(dt < TODAY) return 'overdue';
  if(dt <= today30) return 'soon';
  return '';
}

// KPIs
document.getElementById('today-label').textContent = TODAY.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const counts = { total: ALL_EPICS.length, enCurso:0, porHacer:0, backlog:0, bloqueado:0, valid:0 };
ALL_EPICS.forEach(e => {
  const sl = e.status.toLowerCase();
  if(sl==='en curso') counts.enCurso++;
  if(sl==='tareas por hacer') counts.porHacer++;
  if(sl==='backlog') counts.backlog++;
  if(sl.includes('bloqueado')) counts.bloqueado++;
  if(sl.includes('validaci')) counts.valid++;
});

document.getElementById('kpi-row').innerHTML = `
  <div class="kpi"><span class="kpi-icon">📊</span><div><div class="kpi-val c-blue">${counts.total}</div><div class="kpi-lbl">Total épicas</div></div></div>
  <div class="kpi"><span class="kpi-icon">🔄</span><div><div class="kpi-val c-blue">${counts.enCurso}</div><div class="kpi-lbl">En curso</div></div></div>
  <div class="kpi"><span class="kpi-icon">📌</span><div><div class="kpi-val c-amber">${counts.porHacer}</div><div class="kpi-lbl">Por hacer</div></div></div>
  <div class="kpi"><span class="kpi-icon">📦</span><div><div class="kpi-val c-violet">${counts.backlog}</div><div class="kpi-lbl">Backlog</div></div></div>
  <div class="kpi"><span class="kpi-icon">🚨</span><div><div class="kpi-val c-red">${counts.bloqueado}</div><div class="kpi-lbl">Bloqueados</div></div></div>
  <div class="kpi"><span class="kpi-icon">✅</span><div><div class="kpi-val c-green">${counts.valid}</div><div class="kpi-lbl">En validación</div></div></div>
`;

function renderCards(filter, search){
  const grid = document.getElementById('cards-grid');
  let epics = ALL_EPICS;
  if(filter !== 'all'){
    epics = epics.filter(e => {
      const sl = e.status.toLowerCase();
      const fl = filter.toLowerCase();
      return sl === fl || sl.includes(fl.replace(' 🚨',''));
    });
  }
  if(search){
    const s = search.toLowerCase();
    epics = epics.filter(e => e.summary.toLowerCase().includes(s) || e.key.toLowerCase().includes(s) || e.assignee.toLowerCase().includes(s));
  }
  if(epics.length === 0){
    grid.innerHTML = `<div class="empty-state"><span>🔍</span>No se encontraron épicas con ese criterio.</div>`;
    return;
  }
  grid.innerHTML = epics.map(e => {
    const si = getStatusInfo(e.status);
    const dc = e.duedate ? dueClass(e.duedate) : '';
    const dueStr = e.duedate ? fmtDate(e.duedate) : 'Sin fecha';
    const dueIcon = !e.duedate ? '❓' : (dc==='overdue'?'🔴':dc==='soon'?'🟡':'📅');
    return `
      <div class="card">
        <div class="card-accent accent-${si.cls}"></div>
        <div class="card-header">
          <span class="card-key">${e.key}</span>
          <span class="card-badge bg-${si.cls}">${si.label}</span>
        </div>
        <div class="card-title">${e.summary}</div>
        <div class="card-desc">${e.description}</div>
        <div class="card-meta">
          <span class="due ${dc}">${dueIcon} ${dueStr}</span>
          <span>👤 ${e.assignee}</span>
        </div>
      </div>
    `;
  }).join('');
}

let activeFilter = 'all', searchVal = '';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards(activeFilter, searchVal);
  });
});
document.getElementById('search-input').addEventListener('input', e => {
  searchVal = e.target.value;
  renderCards(activeFilter, searchVal);
});
renderCards('all','');
</script>
</body>
</html>
